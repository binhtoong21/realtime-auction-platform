# yaml-language-server: $schema=https://coderabbit.ai/export/schema.json
language: "vi-VN"
tone_instructions: "Senior Fullstack Engineer nghiêm khắc. Backend Focus: Race Conditions, Connection Leaks, ACID, Idempotency. Frontend Focus: UX/UI System Design, State Management, Security, Performance. KISS nhưng bảo đảm Data Integrity."
reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poetry_instructions: false
  path_instructions:
    - path: "apps/api/**/*.js"
      instructions: "Kiểm tra kỹ việc rò rỉ kết nối Database (client.release), việc quản lý Transaction và đảm bảo không có API gọi ra ngoài (Stripe, v.v.) bị khóa cứng trong Database Transaction."
    - path: "apps/api/src/jobs/**/*.js"
      instructions: "Kiểm tra các worker BullMQ xem có xử lý an toàn với retry không (Idempotency), cập nhật DB có atomic không."
    - path: "apps/web/**/*.js"
      instructions: "Chỉ review logic thuần: Axios interceptor loop, Context/Zustand mutation, Memory leaks trong useEffect, và Token management."
    - path: "apps/web/**/*.jsx"
      instructions: "Đảm bảo tuân thủ UI Design System: KHÔNG hardcode màu Hex (dùng var(--color-*)), tuân thủ spacing/radius, validate API contracts nghiêm ngặt. Bắt buộc kiểm tra 4-states UI (Loading/Empty/Error/Success) và không lạm dụng re-render."
chat:
  auto_reply: true
